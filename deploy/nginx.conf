# SoC 운영 온톨로지 프론트 — 정적 서빙 + API 프록시 (same-origin)
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA 라우팅 — 파일이 없으면 index.html
    location / {
        try_files $uri /index.html;
    }

    # API 프록시 — 브라우저는 same-origin /api만 본다 (토큰 헤더 그대로 전달)
    location /api/ {
        proxy_pass http://api:8155;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 300s;  # LLM 질의(Ask/advisory) 대기
    }
}
