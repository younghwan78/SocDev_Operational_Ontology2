<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SoC Dev Twin — Gate Review (프로토타입)</title>
<style>
:root{
  color-scheme:light;
  --bg:#f4f6f9; --surface:#ffffff; --surface-2:#f7f9fc; --sunken:#eef1f6;
  --ink:#111823; --ink-2:#4a5567; --ink-3:#7b8698; --line:#dde3ec; --line-2:#c9d2df;
  --accent:#1f5fa8; --accent-ink:#1f5fa8; --accent-bg:#eaf2fb;
  --good:#0ca30c; --good-bg:#e8f6e8; --warning:#c98500; --warning-bg:#fbf1dc;
  --serious:#d0662f; --serious-bg:#fbeadf; --critical:#d03b3b; --critical-bg:#fbe6e6;
  --shadow:0 1px 2px rgba(20,30,50,.06),0 4px 16px rgba(20,30,50,.06);
  --shadow-lg:0 8px 40px rgba(20,30,50,.16);
}
:root[data-theme="dark"], :root:where(:not([data-theme="light"])) {}
@media (prefers-color-scheme: dark){
  :root:where(:not([data-theme="light"])){
    color-scheme:dark;
    --bg:#0e1218; --surface:#161c25; --surface-2:#1b222d; --sunken:#10151c;
    --ink:#e8ecf2; --ink-2:#a7b2c2; --ink-3:#6f7c8f; --line:#28313f; --line-2:#354150;
    --accent:#5c9de0; --accent-ink:#7fb2e8; --accent-bg:#17273a;
    --good:#33b533; --good-bg:#132a15; --warning:#e0a02b; --warning-bg:#2c2411;
    --serious:#e58a55; --serious-bg:#2e1f14; --critical:#e75c5c; --critical-bg:#301618;
    --shadow:0 1px 2px rgba(0,0,0,.3),0 4px 16px rgba(0,0,0,.3);
    --shadow-lg:0 8px 40px rgba(0,0,0,.5);
  }
}
:root[data-theme="dark"]{
  color-scheme:dark;
  --bg:#0e1218; --surface:#161c25; --surface-2:#1b222d; --sunken:#10151c;
  --ink:#e8ecf2; --ink-2:#a7b2c2; --ink-3:#6f7c8f; --line:#28313f; --line-2:#354150;
  --accent:#5c9de0; --accent-ink:#7fb2e8; --accent-bg:#17273a;
  --good:#33b533; --good-bg:#132a15; --warning:#e0a02b; --warning-bg:#2c2411;
  --serious:#e58a55; --serious-bg:#2e1f14; --critical:#e75c5c; --critical-bg:#301618;
  --shadow:0 1px 2px rgba(0,0,0,.3),0 4px 16px rgba(0,0,0,.3);
  --shadow-lg:0 8px 40px rgba(0,0,0,.5);
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{font-family:'Pretendard','Noto Sans KR','Apple SD Gothic Neo',system-ui,-apple-system,sans-serif;
  background:var(--bg);color:var(--ink);line-height:1.5;font-size:14px;-webkit-font-smoothing:antialiased;}
button{font-family:inherit;cursor:pointer}
.mono{font-family:'JetBrains Mono','SF Mono',ui-monospace,Menlo,monospace}

/* ===== top bar ===== */
header{position:sticky;top:0;z-index:50;background:var(--surface);border-bottom:1px solid var(--line);
  padding:9px 20px;display:flex;align-items:center;gap:14px;flex-wrap:wrap;box-shadow:var(--shadow)}
.brand{font-weight:800;font-size:15px;letter-spacing:-.2px;display:flex;align-items:center;gap:9px;white-space:nowrap}
.brand .dot{width:9px;height:9px;border-radius:50%;background:var(--accent);box-shadow:0 0 0 3px var(--accent-bg)}
.brand small{font-weight:600;color:var(--ink-3);font-size:11.5px}
.spacer{flex:1}
.seg{display:flex;background:var(--sunken);border:1px solid var(--line);border-radius:9px;padding:2px;gap:1px}
.seg button{border:0;background:transparent;color:var(--ink-2);padding:5px 10px;border-radius:7px;font-size:12px;font-weight:600;white-space:nowrap}
.seg button.on{background:var(--surface);color:var(--accent-ink);box-shadow:var(--shadow)}
.seg button:hover:not(.on){color:var(--ink)}
.ctl-label{font-size:10px;font-weight:700;color:var(--ink-3);text-transform:uppercase;letter-spacing:.5px;margin-right:2px}
.iconbtn{border:1px solid var(--line);background:var(--surface);color:var(--ink-2);width:32px;height:31px;border-radius:8px;font-size:14px}
.iconbtn:hover{color:var(--ink);border-color:var(--line-2)}
.fresh{display:flex;align-items:center;gap:6px;font-size:11.5px;color:var(--ink-3);font-weight:600}
.fresh .pulse{width:7px;height:7px;border-radius:50%;background:var(--good);animation:pulse 2.4s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}

/* ===== layout ===== */
main{max-width:1180px;margin:0 auto;padding:18px 20px 90px}

/* breadcrumb */
.crumbs{display:flex;align-items:center;gap:6px;font-size:12.5px;color:var(--ink-3);margin:2px 0 14px;flex-wrap:wrap}
.crumbs button{border:0;background:transparent;color:var(--accent-ink);font-weight:600;padding:2px 4px;border-radius:5px;font-size:12.5px}
.crumbs button:hover{background:var(--accent-bg)}
.crumbs .sep{color:var(--line-2)}
.crumbs .here{color:var(--ink);font-weight:700}

/* ===== A0 verdict ===== */
.verdict{border-radius:16px;padding:18px 22px;margin-bottom:20px;border:1px solid var(--line);
  background:var(--surface);box-shadow:var(--shadow);position:relative;overflow:hidden}
.verdict::before{content:"";position:absolute;left:0;top:0;bottom:0;width:6px}
.verdict.crit::before{background:var(--critical)}
.verdict.ser::before{background:var(--serious)}
.verdict.warn::before{background:var(--warning)}
.verdict.good::before{background:var(--good)}
.verdict-top{display:flex;align-items:center;gap:14px;flex-wrap:wrap}
.v-badge{font-size:19px;font-weight:800;letter-spacing:-.3px;padding:6px 16px;border-radius:11px;display:flex;align-items:center;gap:9px}
.v-badge.crit{background:var(--critical-bg);color:var(--critical)}
.v-badge.ser{background:var(--serious-bg);color:var(--serious)}
.v-badge.warn{background:var(--warning-bg);color:var(--warning)}
.v-badge.good{background:var(--good-bg);color:var(--good)}
.v-gate{font-size:13px;color:var(--ink-2);font-weight:600}
.v-gate b{color:var(--ink)}
.v-meta{margin-left:auto;text-align:right;font-size:11.5px;color:var(--ink-3);font-weight:600}
.v-reason{margin-top:13px;font-size:14.5px;color:var(--ink);line-height:1.55}
.v-reason b{color:var(--accent-ink)}
.v-cta{margin-top:14px;display:flex;gap:9px;flex-wrap:wrap}
.btn{border:1px solid var(--line-2);background:var(--surface);color:var(--ink);padding:8px 15px;border-radius:9px;font-size:13px;font-weight:700;display:inline-flex;align-items:center;gap:7px}
.btn:hover{border-color:var(--accent);color:var(--accent-ink)}
.btn.primary{background:var(--accent);border-color:var(--accent);color:#fff}
.btn.primary:hover{filter:brightness(1.07);color:#fff}

/* section heading */
.sec-h{display:flex;align-items:baseline;gap:10px;margin:6px 0 12px}
.sec-h h2{font-size:16px;margin:0;letter-spacing:-.2px}
.sec-h .sub{font-size:12px;color:var(--ink-3);font-weight:600}
.altitude-tag{font-size:10px;font-weight:800;letter-spacing:.5px;color:var(--accent-ink);background:var(--accent-bg);
  padding:2px 7px;border-radius:6px}

/* ===== A1 situation board ===== */
.board{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:13px}
.dim{background:var(--surface);border:1px solid var(--line);border-radius:13px;padding:15px 16px;cursor:pointer;
  transition:transform .12s,box-shadow .12s,border-color .12s;position:relative;box-shadow:var(--shadow)}
.dim:hover{transform:translateY(-2px);box-shadow:var(--shadow-lg);border-color:var(--line-2)}
.dim.dim-crit{border-left:4px solid var(--critical)}
.dim.dim-ser{border-left:4px solid var(--serious)}
.dim.dim-warn{border-left:4px solid var(--warning)}
.dim.dim-good{border-left:4px solid var(--good)}
.dim.dimmed{opacity:.42;filter:saturate(.6)}
.dim-head{display:flex;align-items:center;justify-content:space-between;gap:8px}
.dim-name{font-weight:700;font-size:13.5px}
.pill{font-size:10.5px;font-weight:800;padding:2px 8px;border-radius:20px;display:inline-flex;align-items:center;gap:4px;white-space:nowrap}
.pill.crit{background:var(--critical-bg);color:var(--critical)}
.pill.ser{background:var(--serious-bg);color:var(--serious)}
.pill.warn{background:var(--warning-bg);color:var(--warning)}
.pill.good{background:var(--good-bg);color:var(--good)}
.dim-val{font-size:23px;font-weight:800;letter-spacing:-.5px;margin:9px 0 1px;font-variant-numeric:tabular-nums}
.dim-sub{font-size:11.5px;color:var(--ink-3);font-weight:600;display:flex;gap:8px;flex-wrap:wrap}
.dim-sub .tgt{color:var(--ink-2)}
.dim-spark{margin:10px 0 8px}
.dim-delta{font-size:11.5px;font-weight:700;display:inline-flex;align-items:center;gap:4px;padding:2px 7px;border-radius:6px;background:var(--sunken)}
.dim-delta.up{color:var(--good)} .dim-delta.down{color:var(--critical)} .dim-delta.flat{color:var(--ink-3)}
.dim-sowhat{font-size:12px;color:var(--ink-2);margin-top:10px;line-height:1.5;padding-top:10px;border-top:1px dashed var(--line)}
.dim-foot{margin-top:9px;font-size:11.5px;color:var(--accent-ink);font-weight:700;display:flex;align-items:center;gap:5px;opacity:.9}

/* ===== A2 watchlist ===== */
.watch{display:flex;flex-direction:column;gap:10px}
.risk{background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:14px 16px;cursor:pointer;
  display:grid;grid-template-columns:auto 1fr auto;gap:14px;align-items:center;box-shadow:var(--shadow);transition:.12s}
.risk:hover{border-color:var(--accent);box-shadow:var(--shadow-lg)}
.risk-rank{font-size:20px;font-weight:800;color:var(--ink-3);width:30px;text-align:center;font-variant-numeric:tabular-nums}
.risk-main .rt{font-weight:700;font-size:14px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.risk-main .rw{font-size:12.5px;color:var(--ink-2);margin-top:4px;line-height:1.5}
.risk-main .rif{font-size:12px;color:var(--critical);margin-top:5px;font-weight:600}
.risk-main .rif.low{color:var(--ink-3);font-weight:500}
.risk-score{text-align:center;min-width:78px}
.heat{width:56px;height:56px;border-radius:10px;margin:0 auto 4px;display:grid;place-items:center;font-weight:800;font-size:15px;color:#fff}
.heat-lbl{font-size:10px;font-weight:700;color:var(--ink-3);letter-spacing:.3px}
.chip{font-size:10.5px;font-weight:700;padding:2px 7px;border-radius:6px;background:var(--sunken);color:var(--ink-2)}

/* ===== A3 options ===== */
.opts{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:13px;margin-top:4px}
.opt{background:var(--surface);border:1px solid var(--line);border-radius:13px;padding:16px;position:relative;box-shadow:var(--shadow);
  display:flex;flex-direction:column}
.opt.rec{border:1.5px solid var(--good)}
.opt .rec-tag{position:absolute;top:-9px;left:14px;background:var(--good);color:#fff;font-size:10px;font-weight:800;padding:2px 9px;border-radius:6px;letter-spacing:.3px}
.opt-t{font-weight:800;font-size:14.5px;margin-bottom:12px;letter-spacing:-.2px}
.wi{display:flex;justify-content:space-between;gap:10px;font-size:12.5px;padding:6px 0;border-bottom:1px dashed var(--line)}
.wi:last-of-type{border-bottom:0}
.wi .k{color:var(--ink-3);font-weight:600}
.wi .val{font-weight:700;text-align:right}
.wi .val.g{color:var(--good)} .wi .val.w{color:var(--warning)} .wi .val.c{color:var(--critical)} .wi .val.s{color:var(--serious)}
.opt .btn{margin-top:14px;width:100%;justify-content:center}
.resid{display:inline-block;font-size:10px;font-weight:800;padding:1px 6px;border-radius:5px}
.resid.Low{background:var(--good-bg);color:var(--good)}
.resid.Medium{background:var(--warning-bg);color:var(--warning)}
.resid.High{background:var(--critical-bg);color:var(--critical)}

/* ===== A4 evidence ===== */
.ev-grid{display:grid;grid-template-columns:1.3fr 1fr;gap:14px}
@media(max-width:820px){.ev-grid{grid-template-columns:1fr}}
.panel{background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:14px 16px;box-shadow:var(--shadow)}
.panel h3{margin:0 0 10px;font-size:13px;display:flex;align-items:center;gap:7px}
.panel h3 .tag{font-size:10px;font-weight:700;color:var(--ink-3);background:var(--sunken);padding:1px 6px;border-radius:5px}
table{border-collapse:collapse;width:100%;font-size:12px}
th,td{text-align:left;padding:6px 8px;border-bottom:1px solid var(--line)}
th{color:var(--ink-3);font-weight:700;font-size:10.5px;text-transform:uppercase;letter-spacing:.4px}
td.mono{font-variant-numeric:tabular-nums}
.dot-sev{display:inline-block;width:7px;height:7px;border-radius:50%;margin-right:5px}
.trace{display:flex;flex-direction:column;gap:0}
.trace-node{display:flex;align-items:center;gap:9px;padding:7px 0;font-size:12.5px}
.trace-ico{width:26px;height:26px;border-radius:7px;display:grid;place-items:center;font-size:11px;font-weight:800;flex-shrink:0;color:#fff}
.trace-line{margin-left:12px;width:2px;height:12px;background:var(--line-2)}
.trace-node .tn{font-weight:600}.trace-node .td{color:var(--ink-3);font-size:11px}

/* decision drawer */
.drawer-bg{position:fixed;inset:0;background:rgba(10,15,25,.5);z-index:100;display:none;align-items:flex-end;justify-content:center}
.drawer-bg.open{display:flex}
.drawer{background:var(--surface);width:100%;max-width:560px;border-radius:16px 16px 0 0;padding:22px;box-shadow:var(--shadow-lg);
  max-height:88vh;overflow-y:auto;animation:slideup .22s cubic-bezier(.2,.8,.2,1)}
@media(min-width:560px){.drawer-bg{align-items:center}.drawer{border-radius:16px}}
@keyframes slideup{from{transform:translateY(24px);opacity:0}to{transform:translateY(0);opacity:1}}
.drawer h3{margin:0 0 4px;font-size:16px}
.drawer .dsub{font-size:12.5px;color:var(--ink-3);margin-bottom:16px}
.wb{background:var(--sunken);border:1px solid var(--line);border-radius:10px;padding:12px 14px;margin:12px 0;font-size:12.5px}
.wb .wb-h{font-size:10.5px;font-weight:800;color:var(--ink-3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px;display:flex;align-items:center;gap:6px}
.wb-row{display:flex;gap:8px;align-items:flex-start;padding:4px 0;font-size:12.5px}
.wb-row .ar{color:var(--accent-ink);font-weight:800}
.hitl{display:flex;align-items:center;gap:9px;background:var(--accent-bg);border-radius:9px;padding:10px 12px;font-size:12px;color:var(--ink-2);margin:12px 0}
.drawer-cta{display:flex;gap:9px;margin-top:8px}
.drawer-cta .btn{flex:1;justify-content:center}

/* decision log (persona-aware footer rail) */
.log-fab{position:fixed;right:18px;bottom:18px;z-index:60;background:var(--surface);border:1px solid var(--line-2);
  border-radius:12px;padding:10px 14px;box-shadow:var(--shadow-lg);font-size:12px;font-weight:700;display:flex;align-items:center;gap:8px}
.log-fab .n{background:var(--accent);color:#fff;border-radius:20px;padding:1px 7px;font-size:11px}
.toast{position:fixed;left:50%;bottom:22px;transform:translateX(-50%) translateY(20px);z-index:120;background:var(--ink);color:var(--bg);
  padding:11px 18px;border-radius:11px;font-size:13px;font-weight:600;box-shadow:var(--shadow-lg);opacity:0;transition:.3s;pointer-events:none;display:flex;align-items:center;gap:9px}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* exec condensed banner */
.exec-note{font-size:12px;color:var(--ink-3);background:var(--surface-2);border:1px dashed var(--line);border-radius:9px;padding:9px 13px;margin-bottom:14px;display:flex;gap:8px;align-items:center}

.hidden{display:none!important}
.since-badge{font-size:11px;font-weight:700;color:var(--accent-ink);background:var(--accent-bg);padding:3px 9px;border-radius:7px;display:inline-flex;gap:5px;align-items:center}
</style>
</head>
<body>
<header>
  <div class="brand"><span class="dot"></span>SoC Dev Twin <small id="gateLabel">· Aurora / CS 게이트</small></div>
  <div class="spacer"></div>
  <div style="display:flex;align-items:center;gap:6px"><span class="ctl-label">시점</span>
    <button class="iconbtn" id="sinceBtn" title="지난 게이트 대비 변화">Δ</button></div>
  <div style="display:flex;align-items:center;gap:6px"><span class="ctl-label">렌즈</span>
    <div class="seg" id="lensSeg"></div></div>
  <div style="display:flex;align-items:center;gap:6px"><span class="ctl-label">역할</span>
    <div class="seg" id="personaSeg"></div></div>
  <button class="iconbtn" id="themeBtn" title="라이트/다크">◐</button>
  <div class="fresh"><span class="pulse"></span>동기화 2시간 전</div>
</header>

<main>
  <div class="crumbs" id="crumbs"></div>
  <div id="verdict"></div>
  <div id="stage"></div>
</main>

<button class="log-fab" id="logFab">🗐 결정 로그 <span class="n" id="logN">0</span></button>
<div class="drawer-bg" id="drawerBg"><div class="drawer" id="drawer"></div></div>
<div class="toast" id="toast"></div>

<script>
/* ============ SYNTHETIC TWIN STATE ============ */
const SEV={crit:'critical',ser:'serious',warn:'warning',good:'good'};
const SEVLBL={critical:'위험',serious:'주의',warning:'경계',good:'양호'};
const STATUSCOLORS={critical:'var(--critical)',serious:'var(--serious)',warning:'var(--warning)',good:'var(--good)'};

const DIMS=[
 {id:'cov',name:'기능 커버리지',lens:'coverage',st:'critical',val:'87%',tgt:'목표 ≥95%',margin:'-8%p',
  spark:[90,90,89,88,87,87],delta:'-0.4%p',dtrend:'flat',dtxt:'3주째 정체',
  sowhat:'ISP 서브블록 커버리지가 3주째 정체 — 게이트 exit 미달의 <b>지배적 요인</b>.',
  obj:{'테스트':'2,140','미커버 홀':'47','연계 요구':'18'}},
 {id:'def',name:'Open Defect',lens:'quality',st:'serious',val:'3 Crit',tgt:'목표 0 Crit / ≤5 Maj',margin:'Crit +3 · Maj 12',
  spark:[8,6,5,4,3,3],delta:'-1',dtrend:'up',dtxt:'감소 중',
  sowhat:'Critical 3건 중 <b>2건이 ISP 파이프라인</b> — 커버리지 홀과 동일 근원으로 추정.',
  obj:{'Critical':'3','Major':'12','Minor':'41'}},
 {id:'ppa',name:'PPA 마진',lens:'ppa',st:'serious',val:'+4.2%',tgt:'전력 예산 대비',margin:'8K60 decode 초과',
  spark:[6.1,5.4,5.0,4.6,4.3,4.2],delta:'-0.1%p',dtrend:'flat',dtxt:'개선 둔화',
  sowhat:'8K60 decode 전력이 예산 <b>4.2% 초과</b>. DVFS 튜닝 여지는 있으나 미검증.',
  obj:{'유스케이스':'12','예산 초과':'1','전력 rail':'6'}},
 {id:'sch',name:'일정',lens:'schedule',st:'warning',val:'-5일',tgt:'CS 샘플 출하 기준',margin:'슬립 5일',
  spark:[0,-1,-2,-3,-4,-5],delta:'-2일',dtrend:'down',dtxt:'악화',
  sowhat:'ISP 수정 작업이 <b>임계 경로</b> — 커버리지·defect와 동일 블로킹 체인.',
  obj:{'블로킹 이슈':'4','임계경로':'1','WIP':'23'}},
 {id:'spec',name:'Spec 안정성',lens:'spec',st:'good',val:'1.8%',tgt:'churn 목표 ≤3%',margin:'여유',
  spark:[3.2,2.6,2.4,2.1,1.9,1.8],delta:'-0.1%p',dtrend:'up',dtxt:'안정',
  sowhat:'게이트 이후 요구 변경 안정적 — <b>리스크 아님</b>.',
  obj:{'변경 요구':'6','전체 요구':'334','미승인':'0'}},
 {id:'reg',name:'Regression 건전성',lens:'coverage',st:'good',val:'96%',tgt:'pass 목표 ≥95%',margin:'+1%p · farm 88%',
  spark:[94,95,95,96,96,96],delta:'+0.4%p',dtrend:'up',dtxt:'안정',
  sowhat:'farm 활용률 88%, 큐 대기 정상 — <b>병목 아님</b>.',
  obj:{'run':'1,820','fail':'73','farm 활용':'88%'}},
];

const $=s=>document.querySelector(s);
const el=(t,c,h)=>{const e=document.createElement(t);if(c)e.className=c;if(h!=null)e.innerHTML=h;return e;};
function stAbbr(st){return {critical:'crit',serious:'ser',warning:'warn',good:'good'}[st];}
function sparkline(data,color,neg){
 const w=110,h=30,pad=3;const min=Math.min(...data),max=Math.max(...data);const rng=(max-min)||1;
 const pts=data.map((v,i)=>{const x=pad+i*(w-2*pad)/(data.length-1);const y=h-pad-((v-min)/rng)*(h-2*pad);return [x,y];});
 const d=pts.map((p,i)=>(i?'L':'M')+p[0].toFixed(1)+' '+p[1].toFixed(1)).join(' ');
 const area=`M${pts[0][0]} ${h} `+pts.map(p=>'L'+p[0].toFixed(1)+' '+p[1].toFixed(1)).join(' ')+` L${pts[pts.length-1][0]} ${h} Z`;
 const gid='g'+Math.random().toString(36).slice(2,7);
 return `<svg width="${w}" height="${h}" viewBox="0 0 ${w} ${h}" style="display:block">
  <defs><linearGradient id="${gid}" x1="0" x2="0" y1="0" y2="1">
   <stop offset="0" stop-color="${color}" stop-opacity=".22"/><stop offset="1" stop-color="${color}" stop-opacity="0"/></linearGradient></defs>
  <path d="${area}" fill="url(#${gid})"/>
  <path d="${d}" fill="none" stroke="${color}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="${pts[pts.length-1][0].toFixed(1)}" cy="${pts[pts.length-1][1].toFixed(1)}" r="3" fill="${color}"/></svg>`;
}
function heatColor(I,L){const s=I*L;if(s>=6)return 'var(--critical)';if(s>=4)return 'var(--serious)';if(s>=2)return 'var(--warning)';return 'var(--good)';}
function toast(msg){const t=$('#toast');t.innerHTML='✓ '+msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2600);}

function renderBoard(s){

 dims.sort((a,b)=>order[a.st]-order[b.st]);
 let show=dims;
 if(state.persona==='exec') show=dims.slice(0,3);

     <span class="pill ${ab}">${d.st==='good'?'●':d.st==='warning'?'▲':d.st==='serious'?'▲':'⛔'} ${SEVLBL[d.st]}</span></div>

 const ev=EVIDENCE[dimId]||EVIDENCE.cov;
 const wrap=el('div');
 wrap.appendChild(sectionH('근거 · '+dimName(dimId),'온톨로지 상세는 여기서만 — 필요할 때 on-demand로','A4'));
 const grid=el('div','ev-grid');
 // objects panel
 let rows=ev.holes.map(h=>`<tr><td class="mono">${h.id}</td><td>${h.feat}</td><td>${h.owner}</td>
   <td><span class="dot-sev" style="background:${STATUSCOLORS[h.st]}"></span>${SEVLBL[h.st]}</td></tr>`).join('');

   <table><thead><tr><th>ID</th><th>대상</th><th>담당</th><th>심각도</th></tr></thead><tbody>${rows}</tbody></table>
   <div style="font-size:11px;color:var(--ink-3);margin-top:9px">※ 47개 중 상위 4건 · 전체는 Jira 필터로 연결</div>`);

 // traceability panel
 let tr='';ev.trace.forEach((n,i)=>{
  tr+=`<div class="trace-node"><span class="trace-ico" style="background:${n.c}">${n.ico}</span>
     <span><span class="tn">${n.n}</span><br><span class="td">${n.d}</span></span></div>`;
  if(i<ev.trace.length-1)tr+='<div class="trace-line"></div>';
 });
 const p2=el('div','panel',`<h3>추적성 체인 <span class="tag">온톨로지 이웃</span></h3><div class="trace">${tr}</div>
   <div style="font-size:11px;color:var(--ink-3);margin-top:11px">요구→IP→테스트→결함의 링크를 따라간 것 — 그래프 전체가 아니라 <b>이 결정에 필요한 이웃</b>만.</div>`);
 grid.appendChild(p2);
 wrap.appendChild(grid);
 const b=el('button','btn primary','◀ 선택지로 돌아가 결정하기');b.style.marginTop='14px';
 b.onclick=()=>{const r=RISKS.find(x=>x.dim===dimId);if(r){state.selRisk=r.id;go('A3');}else go('A2');};
 wrap.appendChild(b);
 s.appendChild(wrap);
}

function sectionH(title,sub,alt){
 const h=el('div','sec-h');
 h.innerHTML=`<span class="altitude-tag">${alt}</span><h2>${title}</h2><span class="sub">${sub}</span>`;
 return h;
}

/* ============ ACTION / WRITEBACK / HITL ============ */
const ACTION_LABEL={create_eco_workitem:'ECO WorkItem 생성',approve_waiver:'Waiver 승인',update_risk:'Risk 갱신'};
function stageAction(risk,opt){
 const d=$('#drawer');
 const writeback=writebackPreview(opt.action,risk,opt);
 d.innerHTML=`
   <h3>Action 스테이징 · ${ACTION_LABEL[opt.action]}</h3>
   <div class="dsub">${opt.t} — ${opt.summary}</div>
   <div class="wb">
     <div class="wb-h">🡒 Writeback 미리보기 (소스 시스템 반영 전)</div>
     ${writeback}
   </div>
   <div class="hitl">🔒 <b>HITL 게이트</b>: 이 편집은 스테이징(sandbox) 상태입니다. 승인 시에만 Jira/검증DB에 반영되고, 결정 lineage(누가·언제·어떤 데이터 버전)가 기록됩니다.</div>
   <div class="drawer-cta">
     <button class="btn" id="dCancel">취소</button>
     <button class="btn primary" id="dCommit">승인 · 커밋</button>
   </div>`;
 $('#drawerBg').classList.add('open');
 $('#dCancel').onclick=closeDrawer;
 $('#dCommit').onclick=()=>commitAction(risk,opt);
}
function writebackPreview(action,risk,opt){
 if(action==='create_eco_workitem') return `
   <div class="wb-row"><span class="ar">+</span><span><b>WorkItem</b> 생성 · type=ECO · title="${risk.title} 대응"<br>
     <span style="color:var(--ink-3)">→ Jira: AURORA 프로젝트에 이슈 생성 · ISP 컴포넌트 · assignee 자동배정</span></span></div>
   <div class="wb-row"><span class="ar">⇄</span><span><b>link</b> implements → REQ-ISP-118 · blocks → CS 마일스톤</span></div>
   <div class="wb-row"><span class="ar">✎</span><span>Defect Crit-118/124에 코멘트 · 이 ECO로 추적 연결</span></div>`;
 if(action==='approve_waiver') return `
   <div class="wb-row"><span class="ar">+</span><span><b>Waiver</b> 객체 생성 · scope="ISP 8K corner (47 holes)" · expiry=MP 게이트<br>
     <span style="color:var(--ink-3)">→ 검증DB 기록 + Jira 코멘트</span></span></div>
   <div class="wb-row"><span class="ar">✎</span><span><b>Milestone</b> CS.exit_criteria 재계산 · 커버리지 조건 조건부 충족</span></div>
   <div class="wb-row"><span class="ar">+</span><span>후속 검증 조건부 WorkItem 생성 (MP 전 홀 해소)</span></div>`;
 return `<div class="wb-row"><span class="ar">✎</span><span><b>Risk</b> ${risk.id} 상태 갱신 · 완화계획/이월 기록 · Jira 반영</span></div>`;
}
function commitAction(risk,opt){
 state.decisions.push({
  t:new Date ? '방금' : '방금', risk:risk.title, opt:opt.t, action:ACTION_LABEL[opt.action],
  persona:PERSONAS[state.persona].label
 });
 closeDrawer();
 $('#logN').textContent=state.decisions.length;
 toast('결정 커밋됨 · lineage 기록 · '+ACTION_LABEL[opt.action]+' writeback 완료');
}
function closeDrawer(){$('#drawerBg').classList.remove('open');}
$('#drawerBg').onclick=e=>{if(e.target===$('#drawerBg'))closeDrawer();};

function openLogDrawer(){
 const d=$('#drawer');
 let body;
 if(!state.decisions.length){
  body=`<div class="dsub">아직 커밋된 결정이 없습니다. 워치리스트 → 선택지에서 결정을 스테이징하면 여기에 lineage와 함께 쌓입니다.</div>`;
 }else{
  body=state.decisions.map((x,i)=>`<div class="wb" style="margin:8px 0">
     <div class="wb-h">#${state.decisions.length-i} · ${x.t} · ${x.persona}</div>
     <div class="wb-row"><span class="ar">✓</span><span><b>${x.action}</b><br>
       <span style="color:var(--ink-3)">리스크: ${x.risk}<br>선택: ${x.opt}</span></span></div></div>`).reverse().join('');
 }
 d.innerHTML=`<h3>결정 로그 · Decision Lineage</h3>
   <div class="dsub">게이트 리뷰에서 내려진 모든 결정이 데이터 버전과 함께 기록됩니다 — 리플레이·감사 가능.</div>
   ${body}
   <div class="drawer-cta"><button class="btn primary" id="dClose" style="flex:1;justify-content:center">닫기</button></div>`;
 $('#drawerBg').classList.add('open');
 $('#dClose').onclick=closeDrawer;
}

/* ============ BOOT ============ */
setPersona('arch');
</script>
</body>
</html>
